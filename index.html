<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LAQ Eternal Blossoms</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="album-shell" data-glow="on">
    <audio id="bgMusic" src="./media/background.mp4" loop preload="auto"></audio>
    <canvas id="particleCanvas" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <img class="brand-logo-image" src="./media/logo.png" alt="laq sweet and cute">
        <div class="brand-subtitle">ETERNAL BLOSSOMS · HUA HAI JI YI</div>
      </div>
      <div class="status">
        <div>VALLEY: GATHER / 向心汇聚</div>
        <strong id="progressText">0%</strong>
      </div>
    </header>

    <main class="stage" aria-label="3D 相册">
      <section id="deck" class="deck" aria-live="polite"></section>
      <section class="caption" aria-live="polite">
        <p id="captionSmall"></p>
        <h1 id="captionBig"></h1>
      </section>
    </main>

    <footer class="controls">
      <input id="photoInput" class="photo-input" type="file" accept="image/*" multiple>
      <button id="pickPhotos" type="button">选择照片</button>
      <button id="playPause" class="icon-button" type="button" aria-label="暂停">Ⅱ</button>
      <button id="restart" class="icon-button" type="button" aria-label="重播">↻</button>
      <button id="musicToggle" type="button">MUSIC: ON</button>
      <button id="glowToggle" type="button">CONSTANT GLOW: ON</button>
    </footer>

    <section id="noteModal" class="note-modal" aria-hidden="true">
      <div class="note-backdrop" data-close-note></div>
      <article class="note-panel" role="dialog" aria-modal="true" aria-labelledby="noteTitle">
        <button class="note-close" type="button" aria-label="关闭" data-close-note>×</button>
        <div class="note-photo-wrap">
          <img id="noteImage" alt="">
        </div>
        <div class="note-editor">
          <p id="noteKicker">MY DEAREST MOMENT</p>
          <h2 id="noteTitle">安静浅笑 / QUIET SMILE</h2>
          <div id="noteBody" class="note-body"></div>
          <textarea id="noteText" maxlength="120" placeholder="给这张照片加一句只属于你的留言..."></textarea>
          <div class="note-actions">
            <button id="deleteNote" type="button">清空</button>
            <button id="saveNote" type="button">保存留言</button>
            <button type="button" data-close-note>RETURN TO OUR FLOWER SEA</button>
          </div>
        </div>
      </article>
    </section>
  </div>

  <script src="./photos.js"></script>
  <script src="./script.js"></script>
</body>
</html>
